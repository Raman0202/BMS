logLevel: info
logDestinations: [stdout]

rtspAddress: :8554
rtmpAddress: :1935        # ← Larix RTMP ingest
hlsAddress: :8888
webrtcAddress: :8889      # WHIP ingest + WHEP playback
apiAddress: :9997
api: yes
playback: yes
playbackAddress: :9996

protocols: [tcp, udp]
readTimeout: 10s
writeTimeout: 10s
webrtcICEServers2: []

# WebRTC ICE: advertise reachable host(s) + fixed muxed UDP port so
# browsers can receive media from the Dockerised server.
# Override via MTX_WEBRTCADDITIONALHOSTS env var (e.g. ECS task public IP/DNS).
# Defaults to 127.0.0.1 for local dev.
webrtcAdditionalHosts: [127.0.0.1]
webrtcLocalUDPAddress: :18189

hlsAlwaysRemux: yes        # keep HLS segments flowing even with no active reader
hlsVariant: mpegts         # broadest compatibility with hls.js
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

# Allow anonymous publish and read for dev
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:
      - action: api        # allow /v3/paths/list (dashboard /cams discovery)
      - action: metrics

pathDefaults:
  record: yes
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordSegmentDuration: 60s
  recordDeleteAfter: 1h

paths:
  all_others:
    source: publisher
