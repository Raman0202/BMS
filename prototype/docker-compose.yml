services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-4000}:8080"   # JSON API (the one API)
      - "11935:1935"                   # RTMP ingest
      - "18189:18189/udp"              # WebRTC media
    environment:
      MTX_WEBRTCADDITIONALHOSTS: "${MTX_WEBRTCADDITIONALHOSTS:-127.0.0.1}"
    volumes:
      - ./mediamtx_conf/mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  test-stream:
    build:
      context: ./test-stream
    depends_on:
      - app
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
