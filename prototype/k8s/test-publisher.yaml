# Optional in-cluster test publisher. Loops the sample mp4 into the RTMP ingest
# as bus DL1TEST cam 1 — a real video stream always present, no laptop needed.
# Image is built from test-stream/ and pushed to ECR (see below), so the cluster
# pulls it from ECR (no Docker Hub egress at runtime).
#
# Build + push (from prototype/test-stream/):
#   docker build -t 475560691356.dkr.ecr.ap-south-1.amazonaws.com/bms/video/dev:teststream .
#   aws ecr get-login-password --region ap-south-1 | docker login --username AWS \
#     --password-stdin 475560691356.dkr.ecr.ap-south-1.amazonaws.com
#   docker push 475560691356.dkr.ecr.ap-south-1.amazonaws.com/bms/video/dev:teststream
#
# Deploy:  kubectl -n bms-dev apply -f test-publisher.yaml
# Remove:  kubectl -n bms-dev delete -f test-publisher.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-publisher
  namespace: bms-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-publisher
  template:
    metadata:
      labels:
        app: test-publisher
    spec:
      imagePullSecrets:
        - name: ecr-pull
      containers:
        - name: publisher
          image: 475560691356.dkr.ecr.ap-south-1.amazonaws.com/bms/video/dev:teststream
          imagePullPolicy: Always
          env:
            # Publish to the in-cluster ingest Service, not the NodePort.
            # Must target the single real feed `livefeed`; MediaMTX fans it out
            # on-demand to every `*_N` path (e.g. DL1TEST_1) via the regex path
            # in mediamtx.yml. Do NOT publish directly to DL1TEST_1 — that path
            # has a fixed source and rejects publishers.
            - name: RTMP_TARGET
              value: "rtmp://bms-ingest:1935/livefeed"
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: "1"
              # libx264 re-encode of the 1440p sample needs headroom; 256Mi
              # OOMKilled it (exit 137) within a second.
              memory: 768Mi
